<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Shopping Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>My Shopping Store</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Welcome to Our Store</h2>
    <p>Best Deals on Fashion & Electronics</p>
    <button onclick="showMessage()">Shop Now</button>
</section>

<section class="products">
    <div class="card">
        <img src="https://via.placeholder.com/200" alt="Product">
        <h3>Smart Watch</h3>
        <p>$99</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200" alt="Product">
        <h3>Headphones</h3>
        <p>$59</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200" alt="Product">
        <h3>Shoes</h3>
        <p>$79</p>
        <button>Add to Cart</button>
    </div>
</section>

<footer>
    <p>© 2026 My Shopping Store</p>
</footer>

<script src="script.js"></script>
</body>
</html>
